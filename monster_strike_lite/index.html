<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Strike Lite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <div id="ui-layer">
            <div class="top-bar">
                <div class="stat-box">回合: <span id="turn-display">0</span></div>
                <button id="skill-btn" disabled>大絕招 <span id="cd-display">(充能中 0/2)</span></button>
            </div>
            <div class="bottom-bar">
                <button id="type-toggle-btn">目前型態: <span id="type-display" class="bounce-type">反彈型</span></button>
                <div class="stat-box">敵人剩餘: <span id="enemy-count">3</span></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-modal" class="hidden">
            <h1 id="game-over-title">STAGE CLEAR!</h1>
            <p>花費回合數: <span id="final-turns">0</span></p>
            <button id="restart-btn">再來一局</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
